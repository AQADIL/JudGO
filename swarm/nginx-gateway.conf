upstream judgo_api {
    server judgo-api:8080;
}

upstream judgo_frontend {
    server judgo-frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gateway health (rubric: /healthz on all services)
    location = /healthz {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # Backend API
    location /api/ {
        proxy_pass http://judgo_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://judgo_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
