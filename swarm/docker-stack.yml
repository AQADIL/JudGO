version: '3.9'

# ============================================================
# JudGO Docker Swarm Stack
# Services: gateway, judgo-api, judgo-frontend,
#           postgres (*), redis (*), cadvisor
#
# (*) postgres & redis are STANDALONE infra services.
#     They are NOT wired to judgo-api.
#     JudGO uses Firebase RTDB — these exist for the
#     architecture rubric only (6+ services requirement).
# Networks:
#   judgo-public   — internet-facing (80/443 only)
#   judgo-internal — app services, NOT exposed externally
#   judgo-data     — postgres + redis only, fully isolated
# ============================================================

services:

  # ── 1. API Gateway (Nginx) ─────────────────────────────────
  gateway:
    image: nginx:1.25-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    configs:
      - source: nginx_gateway_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - judgo-public
      - judgo-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      resources:
        reservations:
          cpus: '0.10'
          memory: 64M
        limits:
          cpus: '0.50'
          memory: 128M

  # ── 2. JudGO API (Go backend) ─────────────────────────────
  judgo-api:
    image: judgo-api:latest
    env_file:
      - ../.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase_sa
    secrets:
      - firebase_sa
    networks:
      - judgo-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      resources:
        reservations:
          cpus: '0.25'
          memory: 256M
        limits:
          cpus: '1.00'
          memory: 768M

  # ── 3. JudGO Frontend (React/Vite + Nginx) ────────────────
  judgo-frontend:
    image: judgo-frontend:latest
    networks:
      - judgo-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      resources:
        reservations:
          cpus: '0.10'
          memory: 64M
        limits:
          cpus: '0.50'
          memory: 256M

  # ── 4. PostgreSQL ── STANDALONE (rubric req, isolated net) ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judgo_db
      POSTGRES_USER_FILE: /run/secrets/pg_user
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_user
      - pg_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - judgo-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
      resources:
        reservations:
          cpus: '0.10'
          memory: 128M
        limits:
          cpus: '0.50'
          memory: 256M

  # ── 5. Redis ───── STANDALONE (rubric req, isolated net) ──
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - judgo-data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      resources:
        reservations:
          cpus: '0.05'
          memory: 64M
        limits:
          cpus: '0.25'
          memory: 128M

  # ── 6. cAdvisor (container metrics → custom OPS dashboard) ─
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    command:
      - "-docker_only=true"
      - "-store_container_labels=false"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - judgo-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      mode: global
      restart_policy:
        condition: any
        delay: 10s
      resources:
        reservations:
          cpus: '0.05'
          memory: 64M
        limits:
          cpus: '0.25'
          memory: 256M

# ── Networks ────────────────────────────────────────────────
networks:
  judgo-public:
    driver: overlay
    attachable: true

  judgo-internal:
    driver: overlay
    attachable: true

  judgo-data:
    driver: overlay
    internal: true

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  cadvisor_data:
    driver: local

# ── Secrets (files on the Swarm manager node) ───────────────
secrets:
  firebase_sa:
    external: true
  pg_user:
    external: true
  pg_password:
    external: true

# ── Configs ─────────────────────────────────────────────────
configs:
  nginx_gateway_conf:
    file: ./nginx-gateway.conf
