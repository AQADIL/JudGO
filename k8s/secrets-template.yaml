# DO NOT commit real values. Fill in base64-encoded secrets and apply manually.
# Generate: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: judgo-secrets
  namespace: judgo
type: Opaque
data:
  JWT_SECRET: "<base64-encoded-value>"
  FIREBASE_DB_URL: "<base64-encoded-value>"
  GOOGLE_APPLICATION_CREDENTIALS_JSON: "<base64-encoded-json>"
